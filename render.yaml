services:
  - type: web
    name: multimodal-rag
    env: python
    buildCommand: |
      apt-get update && apt-get install -y build-essential
      pip install -r requirements.txt
      pip install --upgrade pip setuptools wheel
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: VISION_MODEL
        value: gemini-2.5-flash
      - key: IMAGES_OUTPUT_DIR
        value: data/extracted/images
      - key: TABLES_OUTPUT_DIR
        value: data/extracted/tables
      - key: PYTHONUNBUFFERED
        value: "1"
